<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI WORLD | Command Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --bg: #030305;
            --silver: #e0e0e0;
            --glass-bg: rgba(255, 255, 255, 0.03); 
            --glass-border: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
            position: relative;
        }

        aside { 
            width: 280px; 
            background: rgba(5, 5, 7, 0.6); 
            backdrop-filter: blur(30px); 
            border-right: 1px solid var(--glass-border); 
            padding: 30px; display: flex; flex-direction: column; justify-content: space-between;
        }

        main { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }

        .module-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-right: 6px solid var(--silver);
            padding: 40px; 
            border-radius: 50px;
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            width: 650px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.7);
        }

        .nav-item {
            padding: 22px; 
            background: rgba(255, 255, 255, 0.04); 
            border: 1px solid var(--glass-border); 
            border-radius: 25px;
            cursor: pointer; display: flex; align-items: center; gap: 15px; 
            transition: all 0.4s ease;
        }

        .nav-item:hover { 
            background: rgba(255, 255, 255, 0.1); 
            transform: translateY(-5px);
        }

        .nav-item.full { grid-column: span 2; }

        .ai-interface {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.85, 0, 0.15, 1); 
            background: rgba(3, 3, 5, 0.98);
            backdrop-filter: blur(40px);
            z-index: 150;
        }
        .ai-interface.active { transform: translateY(0); }

        .chat-scroll { flex: 1; overflow-y: auto; padding: 40px 50px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { 
            max-width: 75%; padding: 16px 24px; border-radius: 25px; font-size: 15px;
            border: 1px solid var(--glass-border);
            line-height: 1.6;
        }
        .user { align-self: flex-end; background: rgba(255,255,255,0.1); border-bottom-right-radius: 5px; }
        .ai { align-self: flex-start; background: rgba(255,255,255,0.03); border-bottom-left-radius: 5px; }

        .input-bar { padding: 30px; }
        .input-wrap { 
            max-width: 850px; margin: 0 auto; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid var(--glass-border); 
            border-radius: 50px; padding: 18px 35px; 
            display: flex; align-items: center;
        }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; }
        .logo { font-size: 26px; font-weight: 800; letter-spacing: -1px; }
    </style>
</head>
<body>
    <aside>
        <div>
            <div class="logo">AI WORLD</div>
            <div id="status" style="font-size: 10px; color: #00ff00; margin-top: 10px;">● SYSTEM READY</div>
        </div>
        <div style="font-size: 11px; opacity: 0.4;">v2.0 Universal Core</div>
    </aside>

    <main>
        <div class="module-panel" id="main-hub">
            <div class="nav-item full" onclick="openAI('CORE CHAT')"><i class="fas fa-comment-alt"></i><span>COMMUNICATION</span></div>
            <div class="nav-item" onclick="openAI('NEURAL CODE')"><i class="fas fa-code"></i><span>CODE ANALYSIS</span></div>
            <div class="nav-item" onclick="openAI('WORLD HUB')"><i class="fas fa-globe"></i><span>WORLD DATA</span></div>
        </div>

        <div id="ai-view" class="ai-interface">
            <div style="padding: 20px 50px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;">
                <span id="mode-label" style="font-weight: 800; opacity: 0.5;">CHAT</span>
                <i class="fas fa-times" style="cursor:pointer; font-size: 20px;" onclick="document.getElementById('ai-view').classList.remove('active')"></i>
            </div>
            <div id="chat-container" class="chat-scroll"></div>
            <div class="input-bar">
                <div class="input-wrap">
                    <input type="text" id="userInput" placeholder="Send command..." onkeypress="if(event.key==='Enter') send()">
                    <i class="fas fa-paper-plane" onclick="send()" style="cursor:pointer; color: var(--silver);"></i>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentMode = "CHAT";
        const memory = { "CORE CHAT":[], "NEURAL CODE":[], "WORLD HUB":[] };

        function openAI(name) {
            currentMode = name;
            document.getElementById('mode-label').innerText = name;
            document.getElementById('ai-view').classList.add('active');
            renderChat();
        }

        function renderChat() {
            const container = document.getElementById('chat-container');
            container.innerHTML = "";
            const logs = memory[currentMode] || [];
            logs.forEach(m => {
                const d = document.createElement('div');
                d.className = `msg ${m.role}`;
                d.innerText = m.text;
                container.appendChild(d);
            });
            container.scrollTop = container.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if(!val) return;

            // 1. Add User Message
            if(!memory[currentMode]) memory[currentMode] = [];
            memory[currentMode].push({role:'user', text: val});
            renderChat();
            input.value = "";

            // 2. Add Loading Message
            const loadingIdx = memory[currentMode].length;
            memory[currentMode].push({role:'ai', text: "Accessing Brain..."});
            renderChat();

            try {
                // 3. THE KEY FIX: FETCH FROM YOUR OWN API
                const res = await fetch('/api/chat', {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: val })
                });

                const data = await res.json();

                if (!res.ok) {
                    memory[currentMode][loadingIdx].text = "SYSTEM ERROR: " + (data.error || "Check Vercel Dashboard");
                } else if (data.candidates && data.candidates[0].content) {
                    // 4. Update with AI Answer
                    memory[currentMode][loadingIdx].text = data.candidates[0].content.parts[0].text;
                } else {
                    memory[currentMode][loadingIdx].text = "NO SIGNAL. Check API Configuration.";
                }
            } catch(e) {
                memory[currentMode][loadingIdx].text = "NETWORK OFFLINE. Ensure Vercel is connected.";
            }
            renderChat();
        }
    </script>
</body>
</html>
